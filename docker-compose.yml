version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: delivery_db
    environment:
      MYSQL_ROOT_PASSWORD: 123456789
      MYSQL_DATABASE: delivery_licoreria
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/db.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  backend:
    build: .
    container_name: delivery_backend
    environment:
      - DB_HOST=db
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      - db
    restart: always

volumes:
  db_data:
